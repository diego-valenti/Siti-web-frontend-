<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>
    <div class="card-container">
    <div class="card">
        <div class="image-section">
            <img src="assets/img/image.png" alt="Sneakers" class="product-img">
            <div class="heart-icon">♡</div>
            <div class="badges">
                <span class="badge white">CAMBIO20</span>
                <span class="badge red">Promo</span>
            </div>
        </div>

        <div class="info-section">
            <h1 class="brand">Calvin Klein</h1>
            <p class="model">Sneakers basse - off white/navy</p>
            <div class="price-container">
                <h2 class="current-price">76,99 €</h2>
                <p class="old-price">Prezzo mediano: <del>109,99 €</del> <span class="discount">-30%</span></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
