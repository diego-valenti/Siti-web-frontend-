        </div>
        <div class="search-bar">
            <span>Ovunque</span>
            <span class="separator">|</span>
            <span>Qualunque settimana</span>
            <span class="separator">|</span>
            <span class="add-guests">Aggiungi ospiti</span>
            <div class="search-icon">🔍</div>
        </div>
        <div class="user-menu">
            <span>Affitta con Airbnb</span>
            <div class="profile-box">☰ 👤</div>
        </div>
    </div>

    <div class="categories-wrapper">
        <div class="categories-scroll">
            <div class="category-item active"><span>Iconiche</span></div>
            <div class="category-item"><span>Piscine</span></div>
            <div class="category-item"><span>Design</span></div>
            <div class="category-item"><span>Baite</span></div>
            <div class="category-item"><span>Campagna</span></div>
            <div class="category-item"><span>Stanze</span></div>
            <div class="category-item"><span>Viste incredibili</span></div>
            <div class="category-item"><span>Spiagge</span></div>
            <div class="category-item"><span>Grotte</span></div>
            <div class="category-item"><span>Tropicali</span></div>
        </div>
    </div>
</header>

<main class="content-placeholder">
    <div class="slider-header">
        <h2>Destinazioni popolari</h2>
        <div class="slider-controls">
            <button onclick="document.querySelector('.grid-content').scrollBy({left: -400, behavior: 'smooth'})">❮</button>
            <button onclick="document.querySelector('.grid-content').scrollBy({left: 400, behavior: 'smooth'})">❯</button>
        </div>
    </div>
    
    <div class="grid-content">
        <div class="dummy-card"></div>
        <div class="dummy-card"></div>
        <div class="dummy-card"></div>
        <div class="dummy-card"></div>
        <div class="dummy-card"></div>
        <div class="dummy-card"></div>
        <div class="dummy-card"></div>
        <div class="dummy-card"></div>
    </div>
</main>

</body>
</html>
